    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .stats {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 30px;
            font-size: 14px;
            color: #666;
        }

        .stats span {
            font-weight: 600;
            color: #333;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 0 30px;
            padding-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        thead {
            background: #f0f2f5;
            position: sticky;
            top: 0;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 14px;
            color: #555;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tr:nth-child(even) {
            background: #fafbfc;
        }

        .rut {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .password {
            background: #fff3cd;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #856404;
        }

        .nombre {
            font-weight: 500;
            color: #333;
        }

        .highlight {
            background: #fff59d;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .footer {
            padding: 20px 30px;
            background: #f8f9fa;
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

            .controls {
                flex-direction: column;
            }

            .search-box {

                width: 100%;
            }

                flex: 1;
            }

                font-size: 12px;
            }

                padding: 8px;
            }

                padding: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Transportes Labbe</h1>
            <p>Credenciales de Acceso - Portal de Conductores</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por RUT o nombre...">
            </div>
            <div class="button-group">
                <button onclick="descargarCSV()">📥 Descargar CSV</button>
                <button onclick="imprimirTabla()">🖨️ Imprimir</button>
            </div>
        </div>

        <div class="stats">
            <div>Total Conductores: <span id="totalCount">313</span></div>
            <div>Mostrando: <span id="displayCount">313</span></div>
        </div>

        <div class="table-wrapper">
            <table id="conductoresTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>RUT</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Contraseña</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="noResults" class="no-results" style="display: none;">
                No se encontraron resultados
            </div>
        </div>

        <div class="footer">
            <p>Documento generado: <strong>11 de Mayo, 2026</strong> | Confidencial - Solo para uso interno</p>
        </div>
    </div>

    <script>
        const conductores = DATA_CONDUCTORES;
        let filteredData = conductores;

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                document.getElementById('noResults').style.display = 'block';
                document.getElementById('conductoresTable').style.display = 'none';
                document.getElementById('displayCount').textContent = '0';
                return;
            }

            document.getElementById('noResults').style.display = 'none';
            document.getElementById('conductoresTable').style.display = 'table';

            data.forEach((conductor, index) => {
                const rut = conductor.rut;
                const digits = rut.replace(/\D/g, '');
                const last4 = digits.slice(-4);
                const password = `labbe${last4}`;
                const nombreCompleto = `${conductor.nombres} ${conductor.apellido_paterno}${conductor.apellido_materno ? ' ' + conductor.apellido_materno : ''}`;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="rut">${rut}</td>
                    <td class="nombre">${conductor.nombres}</td>
                    <td>${conductor.apellido_paterno}</td>
                    <td class="password">${password}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('displayCount').textContent = data.length;
        }

        document.getElementById('searchInput').addEventListener('keyup', function() {
            const searchTerm = this.value.toLowerCase();
            filteredData = conductores.filter(c => {
                const searchFields = `${c.rut.toLowerCase()} ${c.nombres.toLowerCase()} ${c.apellido_paterno.toLowerCase()}`;
                return searchFields.includes(searchTerm);
            });
            renderTable(filteredData);
        });

        function descargarCSV() {
            const csv = [
                ['#', 'RUT', 'Nombre', 'Apellido', 'Contraseña'],
                ...conductores.map((c, i) => {
                    const digits = c.rut.replace(/\D/g, '');
                    const last4 = digits.slice(-4);
                    const password = `labbe${last4}`;
                    return [i + 1, c.rut, c.nombres, c.apellido_paterno, password];
                })
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.setAttribute('href', URL.createObjectURL(blob));
            link.setAttribute('download', `conductores-acceso-${new Date().getTime()}.csv`);
            link.click();
        }

        function imprimirTabla() {
            const printWindow = window.open('', '', 'height=600,width=1200');
            const tabla = document.getElementById('conductoresTable').outerHTML;
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Credenciales de Acceso - Transportes Labbe</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 20px; }
                        h1 { text-align: center; color: #667eea; }
                        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
                        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
                        th { background: #667eea; color: white; }
                        tr:nth-child(even) { background: #f9f9f9; }
                    </style>
                </head>
                <body>
                    <h1>Transportes Labbe - Credenciales de Acceso</h1>
                    ${tabla}
                    <p style="margin-top: 20px; text-align: center; color: #999; font-size: 12px;">
                        Documento confidencial. Imprimido el ${new Date().toLocaleDateString('es-ES')}
                    </p>
                </body>
                </html>
            `);
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 250);
        }

        // Insertar datos
        const DATA_CONDUCTORES = DATA_HERE;

        // Renderizar tabla inicial
        renderTable(conductores);
    </script>
